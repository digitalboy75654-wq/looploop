<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Revenue Dashboard & Chart</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #1e1e2f; 
            --card: #27293d; 
            --text: #ffffff; 
            --success: #00f2c3; 
            --danger: #fd5d93; 
            --gold: #f1c40f;
            --primary: #e14eca;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; display: flex; flex-direction: column; align-items: center; }

        .container { max-width: 1000px; width: 100%; }
        
        /* Header & Filter */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-left: 5px solid var(--primary); }
        .header h1 { font-size: 24px; color: var(--text); display: flex; align-items: center; gap: 10px; }
        
        .filter-select { background: #1e1e2f; color: white; border: 1px solid var(--primary); padding: 10px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; outline: none; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        
        .stat-card h3 { font-size: 14px; opacity: 0.7; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .stat-card i { font-size: 35px; margin-bottom: 10px; opacity: 0.8; }

        .card-dep { border-bottom: 5px solid var(--success); }
        .card-dep h2, .card-dep i { color: var(--success); }

        .card-with { border-bottom: 5px solid var(--danger); }
        .card-with h2, .card-with i { color: var(--danger); }

        .card-rev { border-bottom: 5px solid var(--gold); }
        .card-rev h2, .card-rev i { color: var(--gold); }

        /* Chart Container */
        .chart-wrapper { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); height: 400px; display: flex; justify-content: center; align-items: center; }
        
        /* Loader */
        #loader { text-align: center; color: var(--gold); display: none; font-size: 18px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Analytics & Revenue</h1>
            <select id="time-filter" class="filter-select">
                <option value="1">Last 24 Hours</option>
                <option value="7">Last 7 Days</option>
                <option value="30" selected>Last 30 Days</option>
                <option value="365">Last 1 Year</option>
                <option value="all">All Time</option>
            </select>
        </div>

        <div id="loader"><i class="fas fa-spinner fa-spin"></i> Fetching Data...</div>

        <div class="stats-grid" id="stats-container">
            <div class="stat-card card-dep">
                <i class="fas fa-arrow-down"></i>
                <h3>Total Deposits</h3>
                <h2 id="val-dep">Rs. 0</h2>
            </div>

            <div class="stat-card card-with">
                <i class="fas fa-arrow-up"></i>
                <h3>Total Withdrawals</h3>
                <h2 id="val-with">Rs. 0</h2>
            </div>

            <div class="stat-card card-rev">
                <i class="fas fa-wallet"></i>
                <h3>Net Profit</h3>
                <h2 id="val-rev">Rs. 0</h2>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="revenueChart"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const filterSelect = document.getElementById('time-filter');
        const loader = document.getElementById('loader');
        let myChart = null; // Chart variable

        // Chart Update Function
        function drawChart(dep, wit, rev) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            // Purana chart destroy karo agar pehle se bana hai (filter change karne par)
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'bar', // Graph ki kism: 'bar'
                data: {
                    labels: ['Deposits', 'Withdrawals', 'Net Profit'], // Niche likhe gaye naam
                    datasets: [{
                        label: 'Amount (Rs)',
                        data: [dep, wit, rev], // Firebase ki Asli Values
                        backgroundColor: [
                            'rgba(0, 242, 195, 0.6)', // Success Green
                            'rgba(253, 93, 147, 0.6)', // Danger Red
                            'rgba(241, 196, 15, 0.6)'  // Gold
                        ],
                        borderColor: [
                            '#00f2c3', 
                            '#fd5d93', 
                            '#f1c40f'
                        ],
                        borderWidth: 2,
                        borderRadius: 10, // Chart ke edges gol karne ke liye
                        barPercentage: 0.6 // Bars ki motai
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }, // Upar wala extra label chupane ke liye
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#ffffff', font: { family: 'Poppins' } },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' } // Piche ki halki lines
                        },
                        x: {
                            ticks: { color: '#ffffff', font: { family: 'Poppins', size: 14 } },
                            grid: { display: false } // X axis ki lines band kardi
                        }
                    }
                }
            });
        }

        async function loadRevenue() {
            loader.style.display = 'block';

            const days = filterSelect.value;
            const now = Date.now();
            const timeLimit = (days === 'all') ? 0 : now - (parseInt(days) * 24 * 60 * 60 * 1000);

            try {
                const [depSnap, withSnap] = await Promise.all([
                    get(ref(db, 'deposit_requests')),
                    get(ref(db, 'withdraw_requests'))
                ]);

                let totalDeposits = 0;
                let totalWithdraws = 0;

                if (depSnap.exists()) {
                    Object.values(depSnap.val()).forEach(req => {
                        if (req.status === 'Approved' && (req.timestamp || 0) >= timeLimit) {
                            totalDeposits += Number(req.amount || 0);
                        }
                    });
                }

                if (withSnap.exists()) {
                    Object.values(withSnap.val()).forEach(req => {
                        if (req.status === 'Approved' && (req.timestamp || 0) >= timeLimit) {
                            totalWithdraws += Number(req.amount || 0);
                        }
                    });
                }

                const netProfit = totalDeposits - totalWithdraws;

                document.getElementById('val-dep').innerText = "Rs. " + totalDeposits.toLocaleString();
                document.getElementById('val-with').innerText = "Rs. " + totalWithdraws.toLocaleString();
                document.getElementById('val-rev').innerText = "Rs. " + netProfit.toLocaleString();
                document.getElementById('val-rev').style.color = netProfit >= 0 ? "var(--gold)" : "var(--danger)";

                // ✨ Data laane ke baad Khoobsurat Chart Draw karo ✨
                drawChart(totalDeposits, totalWithdraws, netProfit);

            } catch (error) {
                console.error("Firebase Error: ", error);
            } finally {
                loader.style.display = 'none';
            }
        }

        filterSelect.addEventListener('change', loadRevenue);
        window.onload = loadRevenue;

    </script>
</body>
</html>
