<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Payment Methods</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; 
            --card: #27293d; 
            --text: #ffffff; 
            --primary: #e14eca;
            --success: #00f2c3;
            --gold: #f1c40f;
            --easypaisa: #38b000;
            --jazzcash: #d90429;
            --crypto: #f7931a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* BACK BUTTON STYLE */
        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-back:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .container { background: var(--card); max-width: 600px; width: 100%; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 5px solid var(--success); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 24px; color: var(--success); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header p { opacity: 0.6; font-size: 14px; margin-top: 5px; }

        /* Payment Sections */
        .pay-section { margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; border-left: 4px solid #555; }
        .pay-section.ep { border-left-color: var(--easypaisa); }
        .pay-section.jc { border-left-color: var(--jazzcash); }
        .pay-section.usdt { border-left-color: var(--crypto); }

        .pay-title { font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ep .pay-title { color: var(--easypaisa); }
        .jc .pay-title { color: var(--jazzcash); }
        .usdt .pay-title { color: var(--crypto); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input { width: 100%; background: #151521; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--success); box-shadow: 0 0 8px rgba(0, 242, 195, 0.3); }

        .btn-save { width: 100%; background: linear-gradient(45deg, #11998e, #38ef7d); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 242, 195, 0.4); }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="btn-back" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Back to Admin
    </button>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-university"></i> Payment Settings</h1>
            <p>Update receiver accounts for user deposits</p>
        </div>

        <div class="pay-section ep">
            <div class="pay-title"><i class="fas fa-wallet"></i> EasyPaisa Settings</div>
            <div class="input-grid">
                <input type="text" id="ep-name" placeholder="Account Title (e.g. Ali Raza)">
                <input type="number" id="ep-num" placeholder="Account Number (e.g. 0345...)">
            </div>
        </div>

        <div class="pay-section jc">
            <div class="pay-title"><i class="fas fa-mobile-alt"></i> JazzCash Settings</div>
            <div class="input-grid">
                <input type="text" id="jc-name" placeholder="Account Title (e.g. Ali Raza)">
                <input type="number" id="jc-num" placeholder="Account Number (e.g. 0300...)">
            </div>
        </div>

        <div class="pay-section usdt">
            <div class="pay-title"><i class="fab fa-bitcoin"></i> USDT (TRC20) Settings</div>
            <div class="input-grid">
                <input type="text" id="trc-name" placeholder="Wallet Name (e.g. Binance)">
                <input type="text" id="trc-addr" placeholder="TRC20 Address (Starts with T...)">
            </div>
        </div>

        <button id="save-btn" class="btn-save" onclick="savePaymentInfo()">
            <i class="fas fa-save"></i> Save All Changes
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        // Aapka Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Page Load hone par purana data fill karna
        window.onload = async () => {
            try {
                const snapshot = await get(ref(db, 'admin_accounts'));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    if (data.easypaisa) {
                        document.getElementById('ep-name').value = data.easypaisa.name || "";
                        document.getElementById('ep-num').value = data.easypaisa.number || "";
                    }
                    if (data.jazzcash) {
                        document.getElementById('jc-name').value = data.jazzcash.name || "";
                        document.getElementById('jc-num').value = data.jazzcash.number || "";
                    }
                    if (data.trc20) {
                        document.getElementById('trc-name').value = data.trc20.name || "";
                        document.getElementById('trc-addr').value = data.trc20.address || "";
                    }
                }
            } catch (err) {
                console.error("Data Load Error:", err);
            }
        };

        // Data Save Karne ka Function
        window.savePaymentInfo = async () => {
            const btn = document.getElementById('save-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            const paymentData = {
                easypaisa: {
                    name: document.getElementById('ep-name').value.trim(),
                    number: document.getElementById('ep-num').value.trim()
                },
                jazzcash: {
                    name: document.getElementById('jc-name').value.trim(),
                    number: document.getElementById('jc-num').value.trim()
                },
                trc20: {
                    name: document.getElementById('trc-name').value.trim(),
                    address: document.getElementById('trc-addr').value.trim()
                },
                lastUpdated: Date.now()
            };

            try {
                await update(ref(db, 'admin_accounts'), paymentData);
                btn.innerHTML = '<i class="fas fa-check"></i> Saved Successfully!';
                btn.style.background = "#38b000";
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-save"></i> Save All Changes';
                    btn.style.background = "linear-gradient(45deg, #11998e, #38ef7d)";
                    btn.disabled = false;
                }, 2000);

            } catch (error) {
                alert("Error saving data: " + error.message);
                btn.innerHTML = '<i class="fas fa-save"></i> Save All Changes';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
