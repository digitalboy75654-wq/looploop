<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Broadcast Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; 
            --card: #27293d; 
            --text: #ffffff; 
            --primary: #e14eca;
            --success: #00f2c3;
            --gold: #f1c40f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }

        /* BACK BUTTON STYLE */
        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-back:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .container { background: var(--card); max-width: 600px; width: 100%; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 5px solid var(--primary); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 26px; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header p { opacity: 0.6; font-size: 14px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--gold); }
        
        textarea { width: 100%; background: #151521; color: white; border: 1px solid #444; padding: 15px; border-radius: 10px; font-size: 15px; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(225, 78, 202, 0.3); }

        .btn-send { width: 100%; background: linear-gradient(45deg, var(--primary), #ff6a88); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-send:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(225, 78, 202, 0.4); }
        .btn-send:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }

        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; display: none; }
        .sending { color: var(--gold); }
        .success { color: var(--success); }
    </style>
</head>
<body>

    <button class="btn-back" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Back to Admin
    </button>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-bullhorn"></i> Broadcast Message</h1>
            <p>Send an alert to all registered users instantly</p>
        </div>

        <div class="input-group">
            <label for="b-msg">Your Message:</label>
            <textarea id="b-msg" rows="5" placeholder="Example: 📢 Naya Tournament shuru ho gaya hai! Abhi khelen aur 2x profit kamayen..."></textarea>
        </div>

        <button id="send-btn" class="btn-send" onclick="sendToAll()">
            <i class="fas fa-paper-plane"></i> Send to Everyone
        </button>

        <div id="status-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, get, push, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.sendToAll = async () => {
            const msgBox = document.getElementById('b-msg');
            const message = msgBox.value.trim();
            const btn = document.getElementById('send-btn');
            const status = document.getElementById('status-msg');

            if (!message) {
                alert("Bhai, pehle kuch message toh likhein!");
                return;
            }

            if (!confirm("Kya aap waqai ye message SAB users ko bhejna chahte hain?")) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            status.style.display = 'block';
            status.className = 'sending';
            status.innerText = "Finding all users and sending...";

            try {
                const usersSnap = await get(ref(db, 'users'));
                
                if (usersSnap.exists()) {
                    const allUsers = usersSnap.val();
                    let count = 0;
                    const updates = [];

                    Object.keys(allUsers).forEach(uid => {
                        const newNotifRef = push(ref(db, `users/${uid}/notifications`));
                        const promise = set(newNotifRef, {
                            message: message,
                            timestamp: Date.now(),
                            read: false,
                            type: "broadcast"
                        });
                        updates.push(promise);
                        count++;
                    });

                    await Promise.all(updates);

                    status.className = 'success';
                    status.innerHTML = `<i class="fas fa-check-circle"></i> Sent successfully to ${count} users!`;
                    msgBox.value = ""; 
                } else {
                    status.className = 'sending';
                    status.style.color = 'red';
                    status.innerText = "Koi registered user nahi mila.";
                }

            } catch (error) {
                console.error("Broadcast Error: ", error);
                alert("Error aa gaya: " + error.message);
                status.style.display = 'none';
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send to Everyone';
                }, 2000);
            }
        };
    </script>
</body>
</html>
