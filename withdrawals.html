<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Management - Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; 
            --card: #27293d; 
            --text: #ffffff; 
            --primary: #e14eca;
            --success: #00f2c3;
            --danger: #fd5d93;
            --gold: #f1c40f;
            --blue: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; overflow-x: hidden; }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 5px solid var(--danger); }
        .btn-back { background: transparent; color: var(--text); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); }
        .header-title { font-size: 20px; color: var(--danger); font-weight: bold; display: flex; align-items: center; gap: 10px; }

        /* FILTER BUTTONS */
        .filter-container { margin-bottom: 20px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .btn-filter { background: var(--card); color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: bold; }
        .btn-filter.active { background: var(--danger); color: white; border-color: var(--danger); }

        /* TABLE STYLES */
        .table-wrapper { background: var(--card); border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(0,0,0,0.3); color: var(--gold); padding: 15px; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #333; font-size: 14px; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* BADGES */
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
        .b-pend { background: rgba(241, 196, 15, 0.2); color: var(--gold); border: 1px solid var(--gold); }
        .b-appr { background: rgba(0, 242, 195, 0.2); color: var(--success); border: 1px solid var(--success); }
        .b-rej { background: rgba(253, 93, 147, 0.2); color: var(--danger); border: 1px solid var(--danger); }

        /* ACTION BUTTONS */
        .btn-action { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; margin-bottom: 5px; transition: 0.2s; color: white; display: inline-flex; align-items: center; gap: 5px; }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-approve { background: var(--success); color: black; }
        .btn-reject { background: var(--danger); }

        .empty-state { text-align: center; padding: 40px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Back to Admin
        </button>
        <div class="header-title"><i class="fas fa-money-bill-wave"></i> Withdrawals Manager</div>
    </div>

    <div class="filter-container">
        <button class="btn-filter active" onclick="applyFilter('All', this)">All Requests</button>
        <button class="btn-filter" onclick="applyFilter('Pending', this)">Pending</button>
        <button class="btn-filter" onclick="applyFilter('Approved', this)">Approved</button>
        <button class="btn-filter" onclick="applyFilter('Rejected', this)">Rejected</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>User Details</th>
                    <th>Withdraw Details</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tb-withdraws">
                <tr><td colspan="5" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove, push } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allWithdraws = [];
        let allUsersData = {}; 
        let currentFilter = 'All';
        const TIME_30_DAYS = 30 * 24 * 60 * 60 * 1000; 

        // 1. Fetch Users Data (For Real Names and Balances)
        onValue(ref(db, 'users'), (snap) => {
            if (snap.exists()) {
                allUsersData = snap.val();
                renderTable(); 
            }
        });

        // 2. Fetch Withdraws & Auto-Delete 30-day old records
        onValue(ref(db, 'withdraw_requests'), (snapshot) => {
            allWithdraws = [];
            const now = Date.now();

            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    const data = child.val();
                    const key = child.key;
                    const timestamp = data.timestamp || 0;

                    if (now - timestamp > TIME_30_DAYS) {
                        remove(ref(db, `withdraw_requests/${key}`));
                    } else {
                        allWithdraws.push({ key: key, ...data });
                    }
                });

                allWithdraws.sort((a, b) => b.timestamp - a.timestamp);
            }
            
            renderTable();
        });

        // 3. Filter Buttons Logic
        window.applyFilter = (filterType, btnElem) => {
            currentFilter = filterType;
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            btnElem.classList.add('active');
            renderTable();
        };

        // 4. Render Table Data
        function renderTable() {
            const tb = document.getElementById('tb-withdraws');
            tb.innerHTML = "";

            let filtered = allWithdraws;
            if (currentFilter !== 'All') {
                filtered = allWithdraws.filter(w => w.status === currentFilter);
            }

            if (filtered.length === 0) {
                tb.innerHTML = `<tr><td colspan="5" class="empty-state"><i class="fas fa-folder-open"></i> No withdrawals found.</td></tr>`;
                return;
            }

            filtered.forEach(w => {
                const dateStr = w.timestamp ? new Date(w.timestamp).toLocaleString() : 'Unknown Date';
                
                const uInfo = allUsersData[w.userId] || {};
                const realName = uInfo.username || uInfo.fullName || uInfo.name || w.userName || w.name || 'Unknown User';
                const userBalance = uInfo.balance || 0;
                
                const receiverAcc = w.accountNumber || w.account || w.address || w.phone || 'N/A';
                const receiverName = w.accountTitle || w.accountName || w.title || 'N/A';
                const method = w.method || w.paymentMethod || 'Bank/Wallet';

                let badgeClass = 'b-pend';
                if (w.status === 'Approved') badgeClass = 'b-appr';
                if (w.status === 'Rejected') badgeClass = 'b-rej';

                let actionHTML = '';
                if (w.status === 'Pending') {
                    // Yahan Reject wale button mein amount bhi pass kar rahe hain refund ke liye
                    actionHTML = `
                        <button class="btn-action btn-approve" onclick="approveWith('${w.key}', '${w.userId}', ${w.amount})">
                            <i class="fas fa-check"></i> Approve
                        </button>
                        <button class="btn-action btn-reject" onclick="rejectWith('${w.key}', '${w.userId}', ${w.amount})">
                            <i class="fas fa-times"></i> Reject
                        </button>
                    `;
                }

                tb.innerHTML += `
                    <tr>
                        <td>
                            <small style="color:#aaa;">${dateStr}</small>
                        </td>
                        <td>
                            <b style="color:var(--primary); font-size:15px; text-transform:capitalize;">${realName}</b><br>
                            <small style="color:var(--success);">Current Bal: ₹${userBalance}</small><br>
                            <small style="opacity:0.6;">UID: ${w.userId ? w.userId.substring(0,8) + '...' : 'N/A'}</small>
                        </td>
                        <td>
                            <b style="color:var(--danger); font-size:16px;">₹${w.amount}</b> <small style="color:var(--gold);">(${method})</small><br>
                            <small style="color:#fff;"><b>Send To:</b> ${receiverAcc}</small><br>
                            <small style="color:#aaa;"><b>Title:</b> ${receiverName}</small>
                        </td>
                        <td><span class="badge ${badgeClass}">${w.status}</span></td>
                        <td>${actionHTML}</td>
                    </tr>
                `;
            });
        }

        // 5. APPROVE WITHDRAWAL LOGIC (Deduct nahi karega kyunke frontend pehle hi deduct kar chuka hai)
        window.approveWith = async (key, uid, amount) => {
            if (!confirm(`HINT: Pehle apne account se is user ko ₹${amount} bhejen.\n\nKya aapne paise bhej diye hain aur is request ko APPROVE karna chahte hain?`)) return;

            try {
                // Sirf Status Approved karna hai
                await update(ref(db, `withdraw_requests/${key}`), { status: 'Approved', actionTime: Date.now() });

                // Notification Bhejo
                await push(ref(db, `users/${uid}/notifications`), {
                    message: `Your withdrawal of ₹${amount} has been Approved and sent to your account!`,
                    timestamp: Date.now(),
                    read: false,
                    type: "withdraw_approved"
                });

                alert(`Success! Withdrawal request Approved.`);
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        // 6. REJECT WITHDRAWAL LOGIC (Ye wapis paise Refund karega)
        window.rejectWith = async (key, uid, amount) => {
            if (!confirm(`Are you sure you want to REJECT this withdrawal and REFUND ₹${amount} back to the user's account?`)) return;

            try {
                const userRef = ref(db, `users/${uid}`);
                const snap = await get(userRef);
                
                if (snap.exists()) {
                    let currentBal = Number(snap.val().balance || 0);
                    let refundAmount = Number(amount);
                    
                    // Paise wapis add karo (Refund)
                    let newBal = currentBal + refundAmount;
                    await update(userRef, { balance: newBal });

                    // Request ko Rejected mark karo
                    await update(ref(db, `withdraw_requests/${key}`), { status: 'Rejected', actionTime: Date.now() });
                    
                    // Notification Bhejo
                    await push(ref(db, `users/${uid}/notifications`), {
                        message: `Your withdrawal of ₹${amount} was Rejected. The amount has been refunded to your wallet.`,
                        timestamp: Date.now(),
                        read: false,
                        type: "withdraw_rejected"
                    });
                    
                    alert(`Withdrawal Rejected. ₹${amount} has been successfully refunded to the user's balance.`);
                } else {
                    alert("Error: User not found to refund the amount.");
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

    </script>
</body>
</html>
