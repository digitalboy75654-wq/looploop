<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat & Support</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; 
            --card: #27293d; 
            --text: #ffffff; 
            --primary: #e14eca;
            --success: #00f2c3;
            --danger: #fd5d93;
            --gold: #f1c40f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* BACK BUTTON STYLE */
        .top-bar { padding: 15px 20px; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .btn-back { background: transparent; color: var(--text); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); }

        /* MAIN CHAT LAYOUT */
        .chat-container { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR (USER LIST & SEARCH) */
        .sidebar { width: 320px; background: #151521; border-right: 1px solid #444; display: flex; flex-direction: column; }
        .search-box { padding: 15px; background: var(--card); border-bottom: 1px solid #444; }
        .search-box input { width: 100%; background: #1e1e2f; color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 20px; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary); }
        
        .user-list { flex: 1; overflow-y: auto; }
        .chat-user { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; position: relative; }
        .chat-user:hover { background: rgba(255,255,255,0.05); }
        .chat-user.active { background: var(--card); border-left: 4px solid var(--primary); }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(45deg, var(--primary), #ff6a88); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-weight: 600; font-size: 14px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .user-uid { font-size: 10px; opacity: 0.5; }
        .unread-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; display: none; }

        /* MAIN CHAT AREA */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 18px; color: var(--gold); }
        
        .btn-clear { background: rgba(253,93,147,0.2); color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; display: none; }
        .btn-clear:hover { background: var(--danger); color: white; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg-in { background: #333; align-self: flex-start; border-top-left-radius: 2px; border-left: 3px solid var(--gold); }
        .msg-out { background: linear-gradient(45deg, var(--primary), #9b5cf2); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .msg-time { font-size: 9px; opacity: 0.6; display: block; margin-top: 5px; text-align: right; }

        /* INPUT AREA WITH IMAGE UPLOAD */
        .chat-input { padding: 15px; background: var(--card); border-top: 1px solid #444; display: flex; gap: 10px; align-items: center; }
        
        .btn-attach { background: transparent; color: var(--gold); border: none; font-size: 22px; cursor: pointer; transition: 0.2s; padding: 5px; }
        .btn-attach:hover { transform: scale(1.1); color: var(--primary); }
        .btn-attach:disabled { color: #555; cursor: not-allowed; transform: none; }

        .chat-input input[type="text"] { flex: 1; background: #151521; color: white; border: 1px solid #555; padding: 15px; border-radius: 25px; outline: none; }
        .btn-send { background: var(--gold); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn-send:hover { transform: scale(1.1); }
        .btn-send:disabled { background: #555; cursor: not-allowed; transform: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
        <h3><i class="fas fa-comments"></i> User Support & Messages</h3>
    </div>

    <div class="chat-container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search User by Name or UID..." onkeyup="filterUsers()">
            </div>
            <div class="user-list" id="user-list">
                <div style="text-align:center; padding:20px; opacity:0.5;">Loading Users...</div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <h2 id="c-name">Select a user to start chatting</h2>
                    <small id="c-uid" style="opacity:0.5;"></small>
                </div>
                <button id="btn-clear" class="btn-clear" onclick="deleteAllChats()">
                    <i class="fas fa-trash"></i> Clear History
                </button>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div style="text-align:center; opacity:0.3; margin-top:20vh;">
                    <i class="fas fa-comments" style="font-size:60px; margin-bottom:15px;"></i>
                    <p>No chat selected</p>
                </div>
            </div>

            <div class="chat-input">
                <input type="file" id="img-upload" accept="image/*" style="display: none;">
                <button id="attach-btn" class="btn-attach" onclick="document.getElementById('img-upload').click()" title="Send Photo" disabled>
                    <i class="fas fa-image"></i>
                </button>
                <input type="text" id="msg-input" placeholder="Type your message here..." disabled onkeypress="if(event.key==='Enter') sendReply()">
                <button id="send-btn" class="btn-send" onclick="sendReply()" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let usersData = {};
        let ticketsData = {};
        let currentChatUid = null;
        let lastKnownTicketId = null;
        let lastKnownReply = "";

        onValue(ref(db, 'users'), (snap) => {
            usersData = snap.val() || {};
            renderUserList();
        });

        onValue(ref(db, 'support_tickets'), (snap) => {
            ticketsData = snap.val() || {};
            renderUserList();
            if (currentChatUid) loadChat(currentChatUid, document.getElementById('c-name').innerText);
        });

        window.renderUserList = () => {
            const list = document.getElementById('user-list');
            const searchQ = document.getElementById('search-input').value.toLowerCase();
            list.innerHTML = "";

            let usersArray = Object.entries(usersData).map(([uid, u]) => {
                const name = u.username || u.fullName || u.name || "User_" + uid.substring(0,4);
                let hasUnread = false;
                let lastMsgTime = 0;
                
                Object.values(ticketsData).forEach(t => {
                    if (t.userId === uid) {
                        if (t.timestamp > lastMsgTime) lastMsgTime = t.timestamp;
                        if (t.status === 'Open') hasUnread = true;
                    }
                });

                return { uid, name, hasUnread, lastMsgTime };
            });

            usersArray.sort((a, b) => b.lastMsgTime - a.lastMsgTime);

            usersArray.forEach(user => {
                if (searchQ && !user.name.toLowerCase().includes(searchQ) && !user.uid.toLowerCase().includes(searchQ)) {
                    return; 
                }

                const activeClass = user.uid === currentChatUid ? 'active' : '';
                const dotStyle = user.hasUnread ? "display:block;" : "display:none;";
                const initial = user.name.charAt(0).toUpperCase();

                list.innerHTML += `
                    <div class="chat-user ${activeClass}" onclick="loadChat('${user.uid}', '${user.name.replace(/'/g, "\\'")}')">
                        <div class="user-avatar">${initial}</div>
                        <div class="user-info">
                            <div class="user-name">${user.name}</div>
                            <div class="user-uid">${user.uid.substring(0,10)}...</div>
                        </div>
                        <div class="unread-dot" style="${dotStyle}"></div>
                    </div>
                `;
            });
        };

        window.filterUsers = () => {
            renderUserList();
        };

        window.loadChat = (uid, name) => {
            currentChatUid = uid;
            document.getElementById('c-name').innerText = name;
            document.getElementById('c-uid').innerText = "UID: " + uid;
            document.getElementById('btn-clear').style.display = 'block';
            
            document.getElementById('msg-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('attach-btn').disabled = false; // Photo button enable
            document.getElementById('msg-input').focus();

            renderUserList(); 

            const area = document.getElementById('chat-messages');
            area.innerHTML = "";

            const myTickets = Object.entries(ticketsData)
                .filter(([k, v]) => v.userId === uid)
                .sort((a, b) => a[1].timestamp - b[1].timestamp);

            lastKnownTicketId = null;
            lastKnownReply = "";

            if (myTickets.length === 0) {
                area.innerHTML = `<div style="text-align:center; opacity:0.5; margin-top:20px;">Aap is user se pehli baar chat kar rahe hain. Niche message likhein.</div>`;
                return;
            }

            myTickets.forEach(([tid, t]) => {
                lastKnownTicketId = tid;
                lastKnownReply = t.reply || "";

                if (!t.adminRead) update(ref(db, `support_tickets/${tid}`), { adminRead: true });

                const timeStr = new Date(t.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                let msgContent = t.image ? `<img src="${t.image}" onclick="window.open('${t.image}')"><br>` : "";
                if (t.message && t.message !== "📷 Photo Attached" && t.message !== "Admin started the chat") {
                    msgContent += t.message;
                }

                if (msgContent.trim() !== "") {
                    area.innerHTML += `
                        <div class="msg msg-in">
                            <strong style="color:var(--gold); font-size:10px;">${t.subject || 'Message'}</strong><br>
                            ${msgContent}
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    `;
                }

                if (t.reply) {
                    const adminMessages = t.reply.split("<br><br>");
                    adminMessages.forEach(msg => {
                        if (msg.trim() !== "") {
                            area.innerHTML += `
                                <div class="msg msg-out">
                                    ${msg}
                                </div>
                            `;
                        }
                    });
                }
            });

            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 100);
        };

        // NORMAL TEXT MESSAGE SENDING
        window.sendReply = () => {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if (!txt || !currentChatUid) return;

            input.value = ""; 

            saveMessageToFirebase(txt);
        };

        // ✨ PHOTO COMPRESSION & SENDING LOGIC ✨
        document.getElementById('img-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !currentChatUid) return;

            // Jab tak image upload ho rahi ho, button ko loading dikhao
            const attachBtn = document.getElementById('attach-btn');
            attachBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Image ko canvas me chota karein taake size kam ho jaye
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Base64 format mein change aur quality 60%
                    const base64Data = canvas.toDataURL('image/jpeg', 0.6); 

                    // Firebase me HTML IMG tag bana kar bhej dein
                    const imgTag = `<img src="${base64Data}" onclick="window.open(this.src)" style="max-width: 100%; border-radius: 8px; cursor: pointer;">`;
                    saveMessageToFirebase(imgTag);

                    // Upload finish hone ke baad button wapis normal
                    document.getElementById('img-upload').value = "";
                    attachBtn.innerHTML = '<i class="fas fa-image"></i>';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // REUSABLE FUNCTION TO SAVE MESSAGE OR PHOTO
        function saveMessageToFirebase(content) {
            if (lastKnownTicketId) {
                let finalReply = content;
                if (lastKnownReply !== "") {
                    finalReply = lastKnownReply + "<br><br>" + content;
                }
                
                update(ref(db, `support_tickets/${lastKnownTicketId}`), {
                    reply: finalReply,
                    status: 'Closed',
                    adminRead: true,
                    userRead: false
                });
            } else {
                push(ref(db, 'support_tickets'), {
                    userId: currentChatUid,
                    subject: "Admin Message",
                    message: "Admin started the chat", 
                    reply: content,
                    timestamp: Date.now(),
                    status: 'Closed',
                    adminRead: true,
                    userRead: false
                });
            }
        }

        window.deleteAllChats = () => {
            if (!currentChatUid) return;
            if (confirm("Are you sure? Is user ki saari messages delete ho jayengi.")) {
                const updates = {};
                let hasMessages = false;
                
                Object.entries(ticketsData).forEach(([tid, t]) => {
                    if (t.userId === currentChatUid) {
                        updates[tid] = null;
                        hasMessages = true;
                    }
                });

                if (hasMessages) {
                    update(ref(db, 'support_tickets'), updates).then(() => {
                        document.getElementById('chat-messages').innerHTML = "<div style='text-align:center; opacity:0.5; margin-top:20px;'>Chat cleared successfully.</div>";
                        lastKnownTicketId = null;
                        lastKnownReply = "";
                    });
                }
            }
        };

    </script>
</body>
</html>
