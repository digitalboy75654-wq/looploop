<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedbacks - Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; 
            --card: #27293d; 
            --text: #ffffff; 
            --primary: #e14eca;
            --success: #00f2c3;
            --danger: #fd5d93;
            --gold: #f1c40f;
            --blue: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; overflow-x: hidden; }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 5px solid var(--gold); }
        .btn-back { background: transparent; color: var(--text); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); }
        .header-title { font-size: 20px; color: var(--gold); font-weight: bold; display: flex; align-items: center; gap: 10px; }

        /* TABLE STYLES */
        .table-wrapper { background: var(--card); border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(0,0,0,0.3); color: var(--primary); padding: 15px; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #333; font-size: 14px; vertical-align: middle; line-height: 1.5; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .msg-box { background: #151521; padding: 10px; border-radius: 8px; border-left: 3px solid var(--gold); max-width: 400px; word-wrap: break-word; }

        /* ACTION BUTTONS */
        .btn-action { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; transition: 0.2s; color: white; display: inline-flex; align-items: center; gap: 5px; }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-reply { background: var(--success); color: black; }
        .btn-delete { background: rgba(253,93,147,0.2); color: var(--danger); border: 1px solid var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* BADGE */
        .badge { background: var(--gold); color: black; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }

        /* REPLY MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .m-box { background: var(--card); width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; border-top: 5px solid var(--success); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .close-modal:hover { color: var(--danger); }

        .m-box h2 { margin-bottom: 15px; color: var(--success); }
        textarea { width: 100%; background: #151521; color: white; border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 15px; outline: none; font-size: 14px; resize: none; }
        textarea:focus { border-color: var(--success); }
        .btn-send { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--success); color: black; transition: 0.2s; font-size: 15px; }
        .btn-send:hover { transform: scale(1.02); }

        .empty-state { text-align: center; padding: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Back to Admin
        </button>
        <div class="header-title"><i class="fas fa-comment-alt"></i> User Feedbacks</div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>User Details</th>
                    <th>Feedback Message</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tb-feedbacks">
                <tr><td colspan="4" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading feedbacks...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="replyModal" class="modal">
        <div class="m-box">
            <button class="close-modal" onclick="closeM()"><i class="fas fa-times"></i></button>
            <h2><i class="fas fa-reply"></i> Reply to <span id="r-name" style="color:white;">User</span></h2>
            <p id="r-uid" style="font-size:11px; opacity:0.5; margin-bottom:15px;">UID: ---</p>
            
            <textarea id="reply-msg" rows="5" placeholder="Type your reply here... (User will receive this as a notification)"></textarea>

            <button id="btn-send" class="btn-send" onclick="sendReply()"><i class="fas fa-paper-plane"></i> Send Reply</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push, set, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedUid = null;
        let selectedFeedbackKey = null;

        // Fetch Feedbacks
        onValue(ref(db, 'feedbacks'), (snapshot) => {
            const tb = document.getElementById('tb-feedbacks');
            tb.innerHTML = "";

            if (snapshot.exists()) {
                const feedbacks = snapshot.val();
                
                // Sort by newest first
                const sortedKeys = Object.keys(feedbacks).sort((a, b) => feedbacks[b].timestamp - feedbacks[a].timestamp);

                sortedKeys.forEach(key => {
                    const f = feedbacks[key];
                    const dateStr = f.timestamp ? new Date(f.timestamp).toLocaleString() : "---";
                    const statusBadge = f.status === 'replied' ? `<span class="badge" style="background:var(--success);">Replied</span>` : `<span class="badge">New</span>`;

                    tb.innerHTML += `
                        <tr>
                            <td><small>${dateStr}</small><br>${statusBadge}</td>
                            <td>
                                <b style="color:var(--success); font-size:15px;">${f.name || 'User'}</b><br>
                                <small style="font-family:monospace; opacity:0.6;">UID: ${f.uid ? f.uid.substring(0,8) + '...' : 'N/A'}</small>
                            </td>
                            <td>
                                <div class="msg-box">${f.message}</div>
                            </td>
                            <td>
                                <button class="btn-action btn-reply" onclick="openReply('${f.uid}', '${(f.name || 'User').replace(/'/g, "\\'")}', '${key}')">
                                    <i class="fas fa-reply"></i> Reply
                                </button>
                                <button class="btn-action btn-delete" onclick="deleteFeedback('${key}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tb.innerHTML = `<tr><td colspan="4" class="empty-state"><i class="fas fa-inbox fa-3x" style="margin-bottom:10px; display:block;"></i> No Feedbacks Found</td></tr>`;
            }
        });

        // Open Reply Modal
        window.openReply = (uid, name, fKey) => {
            if (!uid || uid === 'undefined') {
                alert("Is feedback ke sath user ki UID nahi hai, aap reply nahi kar sakte.");
                return;
            }
            selectedUid = uid;
            selectedFeedbackKey = fKey;
            document.getElementById('r-name').innerText = name;
            document.getElementById('r-uid').innerText = "UID: " + uid;
            document.getElementById('reply-msg').value = "";
            document.getElementById('replyModal').style.display = 'flex';
        };

        // Close Modal
        window.closeM = () => {
            document.getElementById('replyModal').style.display = 'none';
        };

        // Send Reply Logic
        window.sendReply = () => {
            const msg = document.getElementById('reply-msg').value.trim();
            const btn = document.getElementById('btn-send');

            if (!msg) {
                alert("Please type a message first!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            // Send notification to user
            const notifRef = push(ref(db, `users/${selectedUid}/notifications`));
            
            set(notifRef, {
                message: `Admin Reply to your feedback: "${msg}"`,
                timestamp: Date.now(),
                read: false,
                type: "admin_reply"
            }).then(() => {
                // Update feedback status to replied
                update(ref(db, `feedbacks/${selectedFeedbackKey}`), { status: 'replied' });
                
                alert("Reply sent successfully!");
                closeM();
            }).catch(err => {
                alert("Error sending reply: " + err.message);
            }).finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reply';
            });
        };

        // Delete Feedback Logic
        window.deleteFeedback = (key) => {
            if (confirm("Are you sure you want to delete this feedback permanently?")) {
                remove(ref(db, `feedbacks/${key}`)).then(() => {
                    // Just removed from DB, onValue will auto-update UI
                }).catch(err => alert("Error: " + err.message));
            }
        };

    </script>
</body>
</html>
