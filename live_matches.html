<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Matches & Dice Control - Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; --card: #27293d; --text: #ffffff; 
            --primary: #e14eca; --success: #00f2c3; --danger: #fd5d93; 
            --gold: #f1c40f; --blue: #3498db; --yellow: #f1c40f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; overflow-x: hidden; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 5px solid var(--danger); }
        .btn-back { background: transparent; color: var(--text); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); }
        .header-title { font-size: 20px; color: var(--danger); font-weight: bold; display: flex; align-items: center; gap: 10px; }

        .matches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        /* Game Card */
        .game-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .game-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        .g-fee { background: rgba(0,242,195,0.2); color: var(--success); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .g-id { font-size: 11px; opacity: 0.6; font-family: monospace; }
        
        /* Player Box */
        .player-box { display: flex; align-items: center; justify-content: space-between; background: #1a1a24; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #fff; }
        .p-red { border-left-color: var(--danger); }
        .p-yellow { border-left-color: var(--yellow); }
        
        .p-info { display: flex; align-items: center; gap: 10px; }
        .p-avatar { width: 35px; height: 35px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid #fff; }
        .p-name { font-size: 13px; font-weight: bold; width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Dice Controllers */
        .dice-controls { display: flex; gap: 4px; }
        .btn-dice { width: 28px; height: 28px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .btn-dice:hover { background: var(--success); color: black; border-color: var(--success); transform: scale(1.1); }
        .btn-dice.active-force { background: var(--danger); color: white; border-color: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> Back to Admin
        </button>
        <div class="header-title"><i class="fas fa-dice"></i> Live Games & Dice Control</div>
    </div>

    <div class="matches-grid" id="matches-container">
        <div class="empty-state"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Scanning Live Games...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDKhHlL52F16AP0d7j5XK9lZduEFBLKBfY", 
            authDomain: "ludo-d46ab.firebaseapp.com", 
            databaseURL: "https://ludo-d46ab-default-rtdb.firebaseio.com", 
            projectId: "ludo-d46ab" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fetch Live Games
        onValue(ref(db, 'matchmaking_pool'), (snapshot) => {
            const container = document.getElementById('matches-container');
            container.innerHTML = "";
            let hasGames = false;

            if (snapshot.exists()) {
                const pools = snapshot.val();
                
                // Har Fee wale folder mein check karo
                Object.entries(pools).forEach(([fee, games]) => {
                    Object.entries(games).forEach(([gameId, gameData]) => {
                        
                        // Game tabhi active hai jab usme players hon aur game state ban chuki ho
                        if (gameData.players && Object.keys(gameData.players).length === 2) {
                            hasGames = true;
                            
                            // Players Data nikalna
                            let redPlayer = null;
                            let yellowPlayer = null;
                            
                            Object.values(gameData.players).forEach(p => {
                                if(p.color === 'red') redPlayer = p;
                                if(p.color === 'yellow') yellowPlayer = p;
                            });

                            // Check agar admin ne pehle se koi dice set kiya hua hai
                            const forcedRed = gameData.forcedDice && gameData.forcedDice.red ? gameData.forcedDice.red : null;
                            const forcedYellow = gameData.forcedDice && gameData.forcedDice.yellow ? gameData.forcedDice.yellow : null;

                            // Render Game Card
                            container.innerHTML += `
                                <div class="game-card">
                                    <div class="game-header">
                                        <span class="g-fee">₹${fee} Table</span>
                                        <span class="g-id">ID: ${gameId.substring(0,8)}</span>
                                    </div>

                                    ${redPlayer ? createPlayerBox(fee, gameId, redPlayer, 'red', forcedRed) : ''}
                                    ${yellowPlayer ? createPlayerBox(fee, gameId, yellowPlayer, 'yellow', forcedYellow) : ''}
                                    
                                </div>
                            `;
                        }
                    });
                });
            }

            if (!hasGames) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-gamepad fa-3x"></i><br><br>No active games right now.</div>`;
            }
        });

        // HTML Generator for Player & Buttons
        function createPlayerBox(fee, gameId, player, color, forcedVal) {
            let buttonsHTML = '';
            for(let i=1; i<=6; i++) {
                let activeClass = (forcedVal === i) ? 'active-force' : '';
                buttonsHTML += `<button class="btn-dice ${activeClass}" onclick="forceDice('${fee}', '${gameId}', '${color}', ${i})">${i}</button>`;
            }

            return `
                <div class="player-box p-${color}">
                    <div class="p-info">
                        <div class="p-avatar" style="background-image: url('${player.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}');"></div>
                        <div class="p-name" style="color: var(--${color === 'yellow' ? 'gold' : 'danger'})">${player.name}</div>
                    </div>
                    <div class="dice-controls">
                        ${buttonsHTML}
                        <button class="btn-dice" title="Clear Force" onclick="forceDice('${fee}', '${gameId}', '${color}', null)" style="background:var(--danger); border-radius:50%;"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `;
        }

        // Send Forced Dice Command to Firebase
        window.forceDice = (fee, gameId, color, number) => {
            const forceRef = ref(db, `matchmaking_pool/${fee}/${gameId}/forcedDice/${color}`);
            
            if (number === null) {
                // Clear force
                set(forceRef, null);
            } else {
                // Set fixed number
                set(forceRef, number);
            }
        };

    </script>
</body>
</html>
